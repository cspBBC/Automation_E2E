image: node:20

pipelines:
  branches:
    develop:
      - step:
          name: Run Playwright Tests (Develop)
          caches:
            - node
          script:
            # Install dependencies
            - npm install
            - npm install -D ts-node typescript
            
            # Install Playwright browsers
            - npx playwright install
            
            # Run DB tests (decrypt-env loaded automatically)
            - npm run dbtest
            
            # Run UI / other Playwright tests
            - npm run test
